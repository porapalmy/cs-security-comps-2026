<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanMal - CS Security Comps 2026</title>
    <style>
        :root {
            --bg-primary: #07080a;
            --bg-card: rgba(13, 15, 20, 0.7);
            --glass-border: rgba(255, 255, 255, 0.255);
            --text-primary: #ffffff;
            --text-secondary: #e8eaed;
            --accent-color: #00e5ff;
            --accent-hover: #00b8d4;
            --accent-glow: rgba(0, 229, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.07), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 100, 200, 0.05), transparent 25%);
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 20px var(--accent-glow);
            letter-spacing: -1px;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            align-items: center;
            width: 100%;
        }

        .secondary-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2rem;
            border-radius: 9999px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
            border: 1px solid transparent;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 14px 0 var(--accent-glow);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .btn-main {
            width: 100%;
            padding: 1.25rem 2rem;
            font-size: 1.15rem;
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border-color: var(--glass-border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        .icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .authors {
            margin-top: 4rem;
            font-size: 0.875rem;
            color: #8a8f98;
        }

        /* Subtle grid background for tech vibe */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 60px 60px;
            background-image:
                linear-gradient(to right, rgba(0, 229, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="container">
        <h1>ScanMal</h1>
        <p>We Built a Malware Scanner with YARA rules.</p>

        <div class="links-container">
            <a href="https://scanmal.com" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-main">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                Visit ScanMal.com
            </a>
            <div class="secondary-links">
                <a href="https://scanmal.com/howitworks" target="_blank" rel="noopener noreferrer"
                    class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    How it works
                </a>
                <a href="https://github.com/porapalmy/cs-security-comps-2026" target="_blank" rel="noopener noreferrer"
                    class="btn btn-secondary">

                    </svg>
                    GitHub
                </a>
            </div>
        </div>

        <div class="authors">
            CS Security Comps 2026 &bull; Rachel A, Jeremy G, Palmy K, Daniel L
        </div>
    </div>
</body>

</html>
